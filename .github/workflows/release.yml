name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            asset: Gladiagon-Setup-mac.dmg
          - os: windows-latest
            platform: win
            asset: Gladiagon-Setup-win.exe
          - os: ubuntu-latest
            platform: linux
            asset: Gladiagon-Setup-linux.AppImage

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Build installer
        run: npm run dist:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: gladiagon-${{ matrix.platform }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: installers
          merge-multiple: true

      - name: List release files
        run: ls -la installers/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Установка Gladiagon

            На странице релиза — **только установщики** (3 файла). Выберите файл для вашей системы:

            | Платформа | Файл |
            |-----------|------|
            | **Windows** | [Gladiagon-Setup-win.exe](https://github.com/${{ github.repository }}/releases/latest/download/Gladiagon-Setup-win.exe) |
            | **macOS** | [Gladiagon-Setup-mac.dmg](https://github.com/${{ github.repository }}/releases/latest/download/Gladiagon-Setup-mac.dmg) |
            | **Linux** | [Gladiagon-Setup-linux.AppImage](https://github.com/${{ github.repository }}/releases/latest/download/Gladiagon-Setup-linux.AppImage) |

            Страница последней версии: https://github.com/${{ github.repository }}/releases/latest

            ### После установки
            1. Откройте приложение Gladiagon
            2. **Провести турнир** → рулсет → система → **Сеть турнира**
            3. Нажмите **«Запустить сервер турнира»**
            4. Передайте ссылку терминалам площадок в той же Wi‑Fi сети
          files: |
            installers/Gladiagon-Setup-mac.dmg
            installers/Gladiagon-Setup-win.exe
            installers/Gladiagon-Setup-linux.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
